<style>
  :root{
    --bg: #f7f7f4;
    --footer-bg: #f8f7f4;
    --ink: #101010;
    --ink-soft: #7e7e7e;
    --white: #ffffff;
    --border: #edebeb;
    --max: 1320px;
    --content-max: 1128px;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Work Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  img{ display:block; max-width:100%; }

  a{ color: inherit; text-decoration: none; }

  /* ---------- HERO ---------- */
  .hero{
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 80px 16px 64px;
    overflow: hidden;
  }
  .hero__bg{
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .hero__bg img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 85% 32%;
  }
  .hero__overlay{
    position: absolute;
    inset: 0;
    z-index: 1;
    background: linear-gradient(rgba(0,0,0,0) 42%, rgba(0,0,0,0.7) 100%);
  }
  .hero__content{
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: var(--max);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding-bottom: 10px;
    padding-left: 60px;
  }
  .hero h1{
    margin: 0;
    width: 100%;
    color: #fff;
    font-family: "Host Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 5vw, 56px);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .hero-meta{
    width: 100%;
    display: flex;
    gap: 52px;
    flex-wrap: wrap;
  }
  .hero-meta__col{
    flex: 1 1 200px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hero-meta__row{
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .hero-meta label{
    color: #b3b3b3;
    font-size: 14px;
    font-weight: 500;
  }
  .hero-meta p{
    margin: 0;
    color: #fff;
    line-height: 1.5;
  }
  .hero-meta strong{ font-weight: 600; }

  /* ---------- LAYOUT ---------- */
  .page{
    max-width: var(--max);
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
  }
  .sidebar{
    position: sticky;
    top: 0;
    height: 100vh;
    width: 120px;
    min-width: 120px;
    display: flex;
    align-items: center;
    padding-left: 64px;
  }
  .sidebar nav{
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: -120px;
  }
  .sidebar a{
    font-family: "Inter", sans-serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: -0.01em;
    opacity: 0.45;
    transition: opacity .3s ease, transform .3s ease;
    transform-origin: left center;
  }
  .sidebar a:hover{ opacity: 0.85; }
  .sidebar a.active{
    opacity: 1;
    font-weight: 500;
    transform: scale(1.06);
  }

  .casestudy{ flex: 1; min-width: 0; }

  section{
    display: flex;
    justify-content: center;
    padding: 0;
    scroll-margin-top: 40px;
  }
  section .frame{
    width: 100%;
    max-width: var(--content-max);
  }
  section img{ width: 100%; height: auto; }
  .rounded-b{ border-radius: 0 0 24px 24px; }
  .rounded-l{ border-radius: 24px 0 0 24px; }

  .research-scroll{
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    height: 431px;
    padding: 20px;
    overflow-x: auto;
  }
  .research-scroll > div{
    flex: 0 0 auto;
    width: 67%;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .research-scroll > div:nth-child(1){ background:#f4f0ea; }
  .research-scroll > div:nth-child(2){ background:#f4efe9; }
  .research-scroll > div:nth-child(3){ background:#f3efe9; }
  .research-scroll img{ width: 100%; height: auto; }

  @media (max-width: 809px){
    .research-scroll{ flex-direction: column; height: auto; padding: 12px 8px; }
    .research-scroll > div{ width: 100%; height: auto; }
  }

  /* ---------- FOOTER ---------- */
  footer.site-footer{
    background: var(--footer-bg);
    display: flex;
    flex-direction: column;
  }
  .footer-inner{
    max-width: var(--max);
    margin: 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    padding: 24px 40px;
    gap: 24px;

  .footer-links{

    align-items: center;
    gap: 20px;

  .footer-links a{

    font-size: 14px;

  }
  .footer-right{

    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .footer-tag{
    color: var(--ink-soft);
    font-family: "Playfair Display", serif;
    font-size: 14px;
    margin: 0;
  }

  @media (max-width: 809px){
    .footer-inner{ flex-direction: column; align-items: flex-start; }
    .footer-right{ align-items: center; text-align: center; }
  }

  /* ---------- NAVBAR ---------- */
  .navbar{
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    align-items: center;
    width: calc(100% - 40px);
    max-width: 700px;
    padding: 12px 20px;
    border-radius: 12px;
    z-index: 1000;
    transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    background: transparent;
    border: 1px solid transparent;
  }
  .navbar.scrolled {
    background-color: rgb(252, 250, 250);
    border-color: rgb(227, 227, 227);
    box-shadow: rgba(0, 0, 0, 0.07) 0px 0.602187px 0.602187px -1.25px, rgba(0, 0, 0, 0.06) 0px 2.28853px 2.28853px -2.5px, rgba(0, 0, 0, 0.03) 0px 10px 10px -3.75px;
  }
  .nav-links-group{
    display: flex;
    gap: 40px;
    align-items: center;
  }
  .nav-link{
    text-decoration: none;
    color: #ffffff;
    font-family: "Work Sans", sans-serif;
    font-size: 15px;
    font-weight: 500;
    height: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 0 4px;
    transition: color 0.3s ease;
  }
  .navbar.scrolled .nav-link{
    color: rgb(16, 29, 49);
  }
  .nav-link-inner{
    display: flex;
    flex-direction: column;
    transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
  }
  .nav-link:hover .nav-link-inner{
    transform: translateY(-24px);
  }
  .nav-link span{
    line-height: 24px;
    height: 24px;
    display: flex;
    align-items: center;
  }

  @media (max-width: 809px){
    .sidebar{ display: none; }
  }

  /* sidebar only desktop */
  @media (max-width: 1023px){
    .sidebar{ display: none; }
  }
</style>

<script>
  // Scroll-spy for sidebar nav
  (function(){
    var links = Array.prototype.slice.call(document.querySelectorAll('#section-nav a'));
    var sections = links
      .map(function(l){ return document.getElementById(l.dataset.section); })
      .filter(Boolean);

    function onScroll(){
      var scrollPos = window.scrollY + window.innerHeight / 3;
      var current = sections[0];
      sections.forEach(function(sec){
        if (sec.offsetTop <= scrollPos) current = sec;
      });
      links.forEach(function(l){
        l.classList.toggle('active', l.dataset.section === current.id);
      });
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  })();

  // Navbar scroll background toggle
  (function(){
    var navbar = document.querySelector('.navbar');
    var hero = document.querySelector('.hero');
    function updateNavbar(){
      var heroBottom = hero.offsetTop + hero.offsetHeight;
      if (window.scrollY > heroBottom - 100) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    }
    window.addEventListener('scroll', updateNavbar, { passive: true });
    updateNavbar();
  })();
</script>
